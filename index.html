<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fitness AI Assistant</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="badge">AI-Фитнестренер</div>
      <h1>Fitness AI Assistant</h1>
      <p>
        Задайте вопрос о тренировках, восстановлении или спортивном питании.
      </p>
    </section>

    <section class="chat-card">
      <div id="chat" class="chat">
        <div class="message assistant">
          Привет! Я помогу найти информацию по тренировкам и спортивному питанию.
        </div>
      </div>

      <div class="examples">
        <button class="example-btn" data-query="Тренировка груди">Тренировка груди</button>
        <button class="example-btn" data-query="Что есть после тренировки?">Что есть после тренировки?</button>
        <button class="example-btn" data-query="Что такое креатин?">Что такое креатин?</button>
      </div>

      <form id="ask-form">
        <input
          id="query-input"
          type="text"
          placeholder="Например: как тренировать спину?"
          required
        />
        <button type="submit">Отправить</button>
      </form>

      <div id="status"></div>

      <p class="disclaimer">
        Информация носит учебный и справочный характер и не заменяет консультацию врача,
        тренера или нутрициолога.
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
